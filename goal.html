<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Motherboard Goal Overlay</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: system-ui, sans-serif; color: white; background: transparent; }
        #goal-container { width: 360px; padding: 4px; }
        
        .header { 
            display: flex; 
            justify-content: space-between; 
            font-size: 14px; 
            font-weight: bold; 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: #ffffff; /* Pure white for max contrast */
            /* Hard black outline + deep drop shadow */
            text-shadow: 
                -1px -1px 0 #000,  
                 1px -1px 0 #000,
                -1px  1px 0 #000,
                 1px  1px 0 #000,
                 0px  4px 10px rgba(0, 0, 0, 1); 
        }
        
        .bar-bg { 
            width: 100%; 
            height: 26px; 
            background: rgba(30, 27, 41, 0.75); 
            border-radius: 6px; 
            overflow: hidden; 
            position: relative; 
            border: 1px solid #4c1d95; 
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5); 
        }
        
        #goal-bar { 
            height: 100%; 
            width: 0%; 
            background: linear-gradient(90deg, #c084fc 0%, #a78bfa 100%); 
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        #goal-text { 
            position: absolute; 
            width: 100%; 
            text-align: center; 
            line-height: 26px; 
            font-size: 13px; 
            font-weight: 800; 
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9); 
        }
    </style>
</head>
<body>
    <div id="goal-container">
        <div class="header">
            <span>Gigabyte B850 GAMING</span>
            <span id="target-text">0 EGP / 9000 EGP</span>
        </div>
        <div class="bar-bg">
            <div id="goal-text">0.00 EGP (0%)</div>
            <div id="goal-bar"></div>
        </div>
    </div>

    <script>
        const GOAL_TARGET = 9000; 
        
        const bar = document.getElementById('goal-bar');
        const barText = document.getElementById('goal-text');
        const topText = document.getElementById('target-text');
        const streamChannel = new BroadcastChannel('stream_events');

        function renderGoal() {
            const current = parseFloat(localStorage.getItem('goal_progress')) || 0;
            const percentage = Math.min((current / GOAL_TARGET) * 100, 100);
            
            bar.style.width = percentage + '%';
            barText.innerText = `${current.toFixed(2)} EGP (${Math.round(percentage)}%)`;
            topText.innerText = `${current.toFixed(0)} EGP / ${GOAL_TARGET} EGP`;
        }

        streamChannel.onmessage = (event) => {
            if (event.data.type === 'NEW_SUPPORT' || event.data.type === 'RESET_GOAL') {
                renderGoal();
            }
        };

        renderGoal();
    </script>
</body>
</html>
