<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Goal Overlay</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: system-ui, sans-serif; color: white; background: transparent; }
        
        /* Clean dark container with a subtle light violet border */
        #goal-container { 
            width: 360px; 
            background: rgba(20, 16, 28, 0.9); 
            border: 2px solid #a78bfa; 
            border-radius: 12px; 
            padding: 12px; 
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.2); 
        }
        
        .header { 
            display: flex; 
            justify-content: space-between; 
            font-size: 14px; 
            font-weight: bold; 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: #e9d5ff; /* Light violet tinted text */
        }
        
        .bar-bg { 
            width: 100%; 
            height: 26px; 
            background: #1e1b29; 
            border-radius: 6px; 
            overflow: hidden; 
            position: relative; 
            border: 1px solid #4c1d95; 
        }
        
        /* New Light Violet Gradient */
        #goal-bar { 
            height: 100%; 
            width: 0%; 
            background: linear-gradient(90deg, #c084fc 0%, #a78bfa 100%); 
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        #goal-text { 
            position: absolute; 
            width: 100%; 
            text-align: center; 
            line-height: 26px; 
            font-size: 13px; 
            font-weight: 800; 
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9); 
        }
    </style>
</head>
<body>

    <div id="goal-container">
        <div class="header">
            <span>Stream Goal</span>
            <span id="target-text">0 EGP / 1000 EGP</span>
        </div>
        <div class="bar-bg">
            <div id="goal-text">0.00 EGP (0%)</div>
            <div id="goal-bar"></div>
        </div>
    </div>

    <script>
        const GOAL_TARGET = 1000; // Change your goal target here if needed
        
        const bar = document.getElementById('goal-bar');
        const barText = document.getElementById('goal-text');
        const topText = document.getElementById('target-text');
        const streamChannel = new BroadcastChannel('stream_events');

        function renderGoal() {
            // Pull the exact progress numbers from local storage
            const current = parseFloat(localStorage.getItem('goal_progress')) || 0;
            const percentage = Math.min((current / GOAL_TARGET) * 100, 100);
            
            // 1. Update progress bar width
            bar.style.width = percentage + '%';
            
            // 2. Update the progress text inside the bar
            barText.innerText = `${current.toFixed(2)} EGP (${Math.round(percentage)}%)`;
            
            // 3. FIXED: Explicitly forcing the top header text to update its values right here
            topText.innerText = `${current.toFixed(0)} EGP / ${GOAL_TARGET} EGP`;
        }

        // Listen for live updates coming directly from the OBS Control Panel Dock
        streamChannel.onmessage = (event) => {
            if (event.data.type === 'NEW_SUPPORT') {
                renderGoal();
            }
        };

        // Run immediately on startup to load saved data
        renderGoal();
    </script>
</body>
</html>
